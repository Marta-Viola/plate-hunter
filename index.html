<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
        <title>PlateHunter | The Licence Plate Game</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>

        <header class="game-header">
            <div class="score-board">
                <div class="player" id="p1-area" value="Player 1">
                    <input type="text" id="p1-name" value="Player 1">
                    <span class="score" id="p1-score">0</span>
                </div>
                <div class="player" id="p2-area">
                    <input type="text" id="p2-name" value="Player 2">
                    <span class="score" id="p2-score">0</span>
                </div>
            </div>
            <div class="active-indicator">
                Current Scorer: <span id="current-player-display">Player 1</span>
            </div>
        </header>

        <main id="plate-grid">

        </main>

        <footer class="controls">
            <button id="undo-btn">↺ Undo</button>
            <button id="reset-btn">🗑️ Reset Trip</button>
            <button id="history-btn">📜 History</button>
        </footer>

        <script src="script.js"></script>
    </body>
</html>
