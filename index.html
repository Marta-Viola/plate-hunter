<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
        <title>PlateHunter | The Licence Plate Game</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>

        <div id="start-screen" class="overlay">
            <div class="modal">
                <h1>PlateHunter 🚗</h1>
                <p>Ready for a new adventure?</p>

                <div class="input-group">
                    <label>Trip Title</label>
                    <input type="text" id="trip-title" placeholder="e.g. Milano-Bari">
                </div>

                <div class="input-group">
                    <label>Players</label>
                    <input type="text" id="p1-input" placeholder="Name Player 1" value="Player 1">
                    <input type="text" id="p2-input" placeholder="Name Player 2" value="Player 2">
                </div>

                <button id="start-trip-btn" class="primary-btn">Start Trip!</button>
                <button id="view-history-btn" class="secondary-btn">View Past Trips</button>
            </div>
        </div>

        <div id="game-container" class="hidden">
            <header class="game-header">
                <h2 id="current-trip-display">Trip Name</h2>

                <div class="swipe-area" id="player-swipe-area">
                    <div class="player-card" id="p1-area">
                        <span class="player-name" id="p1-name-display">Player 1</span>
                        <span class="score" id="p1-score">0</span>
                    </div>
                    <div class="player-card" id="p2-area">
                        <span class="player-name" id="p2-name-display">Player 2</span>
                        <span class="score" id="p2-score">0</span>
                    </div>
                </div>
                <p class="swipe-hint">← Swipe to change active player →</p>
            </header>
        
            <main id="plate-grid">
            </main>

            <footer class="controls">
                <button id="undo-btn">↺ Undo</button>
                <button id="reset-btn">🗑️ Reset Trip</button>
                <button id="history-btn">📜 History</button>
            </footer>
        </div>

        <div id="history-modal" class="overlay hidden">
            <div class="modal">
                <h2>Past Trips</h2>
                <div id="history-list">
                </div>
                <button id="close-history-btn" class="secondary-btn">Close</button>
            </div>
        </div>
    
        <script src="script.js"></script>
    </body>
</html>
